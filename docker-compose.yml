services:
  killswitch:
    image: ghcr.io/mewejo/switch-killswitch:latest
    build: .
    # Host networking: the poller must reach the switch's management IP, and
    # the default SMTP target (localhost:25) means the relay on the docker
    # host. No inbound ports are ever opened — polling is outbound-only.
    network_mode: host
    restart: unless-stopped
    # All configuration comes from the environment — no volumes needed.
    # Copy .env.example to .env and fill it in.
    env_file: .env
