# Copy to config/config.yaml (gitignored) and adjust for your network.

# SNMPv3 credentials used for polling link state and for the shutdown SET.
snmp:
  user: "portshut-user"
  auth_protocol: "SHA"          # MD5 | SHA | SHA224 | SHA256 | SHA384 | SHA512
  auth_password_file: "secrets/snmp_auth"
  priv_protocol: "DES"          # DES | AES | AES192 | AES256 — match the switch
  priv_password_file: "secrets/snmp_priv"

# Detection is polling-only by design: no inbound ports, no reliance on the
# switch's trap engine (which some firmware ships broken — see
# docs/fastpath-notes.md). ifLastChange is polled alongside ifOperStatus to
# catch flaps that happen entirely between two polls.
poll:
  interval_seconds: 0.5
  # A port must be continuously up this long before it's on the instant
  # trigger — links commonly bounce once right after an admin re-enable.
  # While settling, a drop must persist unarmed_persist_seconds to kill.
  arm_delay_seconds: "${ARM_DELAY:-30}"
  unarmed_persist_seconds: "${ARM_PERSIST:-5}"

# Multiple instances may run for redundancy: every instance stands down if
# the port is already admin-down. KILL_DELAY=0 on the primary; a few seconds
# on standbys so they only act (and notify) if the primary didn't.
redundancy:
  standby_delay_seconds: "${KILL_DELAY:-0}"

rate_limit:
  max_actions: 10
  per_seconds: 60

# Fired on: port_killed (confirmed), kill_failed, rate_limited.
notifications:
  email:
    enabled: "${EMAIL_ENABLED:-true}"
    smtp_host: "${SMTP_HOST:-localhost}"
    smtp_port: "${SMTP_PORT:-25}"
    security: "none"            # starttls | ssl | none
    from: "${SMTP_FROM:-killswitch@localhost}"
    to:
      - "${SMTP_TO:-alerts@example.com}"
    subject_prefix: "[killswitch]"
  home_assistant:
    enabled: "${HA_ENABLED:-false}"
    base_url: "${HA_BASE_URL:-http://homeassistant.local:8123}"
    token_env: "HA_TOKEN"
    event_type: "${HA_EVENT_TYPE:-switch_killswitch}"

# Home Assistant control surface over MQTT. Publishes an MQTT-discovery switch
# entity per watched port so its state is visible in HA and can be toggled
# (re-enable a killed port, or shut one on demand) from the dashboard. The
# connection to the broker is outbound-only — no inbound port is opened — and
# every toggle is announced as port_restored/port_disabled so manual changes
# stay auditable. Set both allow_* to false for a visibility-only entity.
mqtt_control:
  enabled: "${MQTT_ENABLED:-false}"
  host: "${MQTT_HOST:-homeassistant.local}"
  port: "${MQTT_PORT:-1883}"
  username: "${MQTT_USERNAME:-}"
  password_env: "MQTT_PASSWORD"
  tls: "${MQTT_TLS:-false}"
  discovery_prefix: "${MQTT_DISCOVERY_PREFIX:-homeassistant}"
  base_topic: "${MQTT_BASE_TOPIC:-switch_killswitch}"
  device_name: "${MQTT_DEVICE_NAME:-Switch Killswitch}"
  allow_reenable: "${MQTT_ALLOW_REENABLE:-true}"
  allow_disable: "${MQTT_ALLOW_DISABLE:-true}"

switches:
  - name: "switch-1"
    ip: "192.0.2.10"
    allowed_ifindexes:          # ports the killswitch may shut; verify the
      - 24                      # ifIndex mapping with an ifDescr walk first
    debounce_seconds: 10
