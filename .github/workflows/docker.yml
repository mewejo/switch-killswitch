name: build-and-publish

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

# Least privilege by default: PR runs (and the test job) get a read-only token.
# Only the publish job below is granted packages: write.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"   # match the runtime image (Dockerfile)

      - run: pip install --no-cache-dir -r requirements.txt

      # End-to-end proof: fake SNMPv3 switch, SMTP sink, HA API and MQTT broker,
      # all on localhost. Exits non-zero if any scenario fails.
      - run: python -m tests.prove_theory

  docker:
    # Publish only after the tests pass, and never for a pull request (no push
    # to the registry from a PR — the test job above is the PR's gate).
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # scoped here: only this job pushes to GHCR
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
